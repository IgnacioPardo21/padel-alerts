name: Padel Alerts

on:
  schedule:
    - cron: '*/5 * * * *'  # Ejecuta cada 5 minutos
  workflow_dispatch:          # Permite ejecutar manualmente

jobs:
  detect_match:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # Muy importante para hacer pull/rebase completos

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Padel Alert Script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_DEST: ${{ secrets.EMAIL_DEST }}
        run: |
          python padel_alert.py

      - name: Commit matches.json only
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Ignorar alert_state.json para que no interfiera
          git update-index --assume-unchanged alert_state.json || true

          # Añadir solo matches.json
          git add docs/matches.json

          # Commit solo si hay cambios
          git diff --cached --quiet || git commit -m "Actualizar matches.json automáticamente"

          # Configurar remoto con token del workflow
          git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/IgnacioPardo21/padel-alerts.git

          # Traer últimos cambios y rebase
          git fetch origin main
          git rebase origin/main

          # Push seguro
          git push origin main
